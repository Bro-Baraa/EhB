<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Thema Switcher</title>
<style>
body {
    font-family: Arial, sans-serif;
    padding: 30px;
}
body.dark-theme {
    background-color: #333;
    color: #fff;
}
body.light-theme {
    background-color: #fffbe7;
    color: #333;
}
.theme-button {
    padding: 10px;
    margin: 20px 0;
    cursor: pointer;
}
</style>
</head>
<body>

<h1>Thema Switcher</h1>

<button id="themeToggle" class="theme-button">

</button>

<div class="content">
    <h2>Welkom op onze website</h2>
    <p>Dit is een voorbeeld van een thema switcher met localStorage.</p>
</div>

<script src="script.js"></script>
</body>
</html>
